services:
  backend:
    build: ./backend
    container_name: zanlytics-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - ZAN_OLLAMA_URL=http://host.docker.internal:11434
      - ZAN_OLLAMA_MODEL=qwen2.5:14b
      - ZAN_OLLAMA_EMBED_MODEL=nomic-embed-text
      - ZAN_DB_PATH=data/zandb.sqlite
      - ZAN_CHROMA_PATH=data/chroma
      - ZAN_RAW_HTML_PATH=data/raw_html
      - ZAN_CORS_ORIGINS=["http://localhost:3100","http://localhost:3300","http://100.118.110.5:3100"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: zanlytics-frontend
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/", "||", "exit", "1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
